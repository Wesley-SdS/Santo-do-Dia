services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: santododia-db
    environment:
      POSTGRES_DB: santododia
      POSTGRES_USER: santododia
      POSTGRES_PASSWORD: santododia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: santododia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
